apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multiservice-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AnouarMohamed/k8s-multiservice-lab.git
    targetRevision: main
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: stg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: flask-api
      namespace: stg
      jsonPointers:
        - /spec/template/spec/containers/0/image
