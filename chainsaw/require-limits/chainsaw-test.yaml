apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-limits
spec:
  steps:
    - name: missing-limits-pod-is-denied
      try:
        - apply:
            file: ../../examples/violations/missing-limits-pod.yaml
            expect:
              - check:
                  ($error != null): true
                  (contains($error, 'require-resource-limits')): true
