apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: disallow-root
spec:
  steps:
    - name: root-pod-is-denied
      try:
        - apply:
            file: ../../examples/violations/root-pod.yaml
            expect:
              - check:
                  ($error != null): true
                  (contains($error, 'disallow-root-user')): true
