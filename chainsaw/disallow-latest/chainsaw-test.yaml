apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: disallow-latest
spec:
  steps:
    - name: latest-tag-is-denied
      try:
        - apply:
            file: ../../examples/violations/latest-tag-pod.yaml
            expect:
              - check:
                  ($error != null): true
                  (contains($error, 'disallow-latest-tag')): true
