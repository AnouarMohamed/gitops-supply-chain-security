apiVersion: v1
kind: Pod
metadata:
  name: allowed-non-root-limited
  labels:
    app.kubernetes.io/name: allowed-non-root-limited
    app.kubernetes.io/part-of: gitops-supply-chain-security
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: main
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - "echo allowed"
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
